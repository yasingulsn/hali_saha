# ─── APPLICATION ─────────────────────────────────────────────
quarkus.application.name=halisaha-api
quarkus.http.port=8080

# ─── DATABASE (PostgreSQL) ───────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=123456
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/halisaha

# Dev'de yeni alanlar eklendiginde tabloyu otomatik guncelle
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ─── JWT CONFIGURATION ──────────────────────────────────────
mp.jwt.verify.publickey.location=classpath:publicKey.pem
mp.jwt.verify.issuer=halisaha-api
smallrye.jwt.sign.key.location=classpath:privateKey.pem
smallrye.jwt.new-token.lifespan=900

# ─── CUSTOM JWT SETTINGS ────────────────────────────────────
halisaha.jwt.access-token-suresi-dakika=15
halisaha.jwt.refresh-token-suresi-gun=30

# ─── SECURITY (Brute-force) ─────────────────────────────────
halisaha.security.max-basarisiz-deneme=5
halisaha.security.kilit-suresi-dakika=15

# ─── CORS ────────────────────────────────────────────────────
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=content-type,authorization
quarkus.http.cors.access-control-max-age=24H

# ─── LOGGING ─────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."com.halisaha".level=DEBUG
