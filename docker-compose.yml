services:
  postgres:
    image: postgres:18-alpine
    container_name: halisaha-postgres
    environment:
      POSTGRES_DB: halisaha
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d halisaha"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    container_name: halisaha-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/halisaha
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: 123456
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: update
      QUARKUS_MAILER_MOCK: "true"
    ports:
      - "8080:8080"

  frontend:
    profiles:
      - web
    build:
      context: ./frontend
      args:
        API_BASE_URL: http://localhost:8080
    container_name: halisaha-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres-data:
